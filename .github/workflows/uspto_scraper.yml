name: Weekly USA Patent Scraper

on:
  schedule:
    # Runs at midnight (00:00) UTC every single day
    - cron: '0 0 * * *'
  # This line lets you run it manually by clicking a button
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run USA Scraper
        env:
          # This connects your GitHub secrets to the Python script
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python usa.py
